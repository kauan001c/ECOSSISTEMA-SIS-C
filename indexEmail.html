<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SIS-C EMAIL</title>
	<link rel="icon" type="image/x-icon" href="icosis-c.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			min-height: 100vh;
			font-family: "Manrope", sans-serif;
			display: grid;
			place-items: center;
			padding: 24px;
			background:
				radial-gradient(circle at top left, rgba(47, 127, 179, 0.18), transparent 28%),
				radial-gradient(circle at bottom right, rgba(29, 77, 66, 0.14), transparent 24%),
				linear-gradient(135deg, #f7f9fb 0%, #e9eef2 100%);
		}

		.message {
			width: min(680px, 100%);
			padding: 40px 32px;
			border-radius: 32px;
			background: rgba(255, 255, 255, 0.86);
			border: 1px solid rgba(255, 255, 255, 0.76);
			box-shadow: 0 24px 80px rgba(31, 52, 66, 0.12);
			backdrop-filter: blur(16px);
			text-align: center;
		}

		.message h1 {
			font-family: "Sora", sans-serif;
			font-size: clamp(2rem, 4vw, 3rem);
			line-height: 1.05;
			letter-spacing: -0.04em;
			color: #1f3442;
		}

		.message p {
			margin-top: 14px;
			font-size: 1rem;
			line-height: 1.7;
			color: #667786;
		}
	</style>
</head>
<body>
	<div class="message">
		<h1>SIS-C EMAIL</h1>
		<p>Este módulo está em desenvolvimento.</p>
	</div>
</body>
</html>
