<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIS-C | Pausa</title>
    <link rel="icon" type="image/png" href="icosis-c.png">
    <style>
        :root {
            --bg: #000000;
            --panel: rgba(255, 255, 255, 0.04);
            --line: rgba(255, 255, 255, 0.08);
            --text: #f5f7fb;
            --text-soft: rgba(245, 247, 251, 0.72);
            --glow: rgba(98, 241, 255, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: "Bahnschrift", "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            padding: clamp(18px, 4vw, 32px);
            text-align: center;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background: radial-gradient(circle at center, rgba(98, 241, 255, 0.08), transparent 28%);
            filter: blur(24px);
        }

        body::after {
            background: radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.72) 100%);
        }

        main {
            position: relative;
            z-index: 2;
            width: min(100%, 760px);
            margin: 0 auto;
            display: grid;
            justify-items: center;
            align-content: center;
            gap: 0;
        }

        h1 {
            margin: 0 0 28px;
            font-size: clamp(2rem, 5vw, 3.8rem);
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .symbol-wrap {
            display: grid;
            place-items: center;
            margin-bottom: 28px;
        }

        .symbol {
            width: clamp(110px, 24vw, 180px);
            aspect-ratio: 1;
            border-radius: 50%;
            padding: clamp(12px, 3vw, 16px);
            background: radial-gradient(circle, rgba(98, 241, 255, 0.08), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px var(--glow), 0 0 70px rgba(111, 255, 196, 0.1);
        }

        .symbol img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        p {
            margin: 0 auto;
            max-width: 34ch;
            font-size: clamp(1rem, 1.8vw, 1.2rem);
            line-height: 1.8;
            color: var(--text-soft);
        }

        @media (max-width: 640px) {
            body {
                padding: 20px;
            }

            h1 {
                margin-bottom: 22px;
                letter-spacing: 0.08em;
            }

            .symbol-wrap {
                margin-bottom: 22px;
            }

            p {
                max-width: 28ch;
                line-height: 1.7;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Sistema Suspenso</h1>
        <div class="symbol-wrap">
            <div class="symbol">
                <img src="icosis-c.png" alt="Simbolo do sistema SIS-C">
            </div>
        </div>
        <p>Retorno em breve.</p>
    </main>
</body>
</html>
