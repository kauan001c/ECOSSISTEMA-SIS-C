<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIS-C | Entrar</title>
<link rel="icon" type="image/png" href="icosis-c.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0f;font-family:'Inter',sans-serif;overflow:hidden}

/* ── BACKGROUND ANIMATED BLOBS ── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.55;animation:drift 14s ease-in-out infinite alternate}
.blob1{width:520px;height:520px;background:radial-gradient(circle,#1d4ed8,transparent 70%);top:-140px;left:-140px;animation-duration:16s}
.blob2{width:420px;height:420px;background:radial-gradient(circle,#7c3aed,transparent 70%);bottom:-120px;right:-80px;animation-duration:12s;animation-delay:-6s}
.blob3{width:300px;height:300px;background:radial-gradient(circle,#0891b2,transparent 70%);top:40%;left:60%;animation-duration:18s;animation-delay:-3s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.08)}}

/* ── PAGE CENTER ── */
.page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

/* ── CARD ── */
.card{
  width:min(420px,100%);
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:20px;
  padding:42px 40px 38px;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 32px 80px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.07);
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(32px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── LOGO ── */
.card-logo{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:30px}
.card-logo img{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(99,102,241,.5))}
.card-logo h1{font-size:1.5rem;font-weight:800;color:#fff;letter-spacing:.03em}
.card-logo p{font-size:.82rem;color:rgba(255,255,255,.42);font-weight:400;margin-top:-6px}

/* ── SOCIAL BUTTONS ── */
.social-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.btn-social{
  display:flex;align-items:center;justify-content:center;gap:9px;
  height:44px;border-radius:11px;border:1px solid rgba(255,255,255,0.13);
  background:rgba(255,255,255,0.06);
  color:#fff;font:600 .84rem 'Inter',sans-serif;
  cursor:pointer;transition:background .18s,border-color .18s,transform .12s;
  text-decoration:none;
}
.btn-social:hover{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.22);transform:translateY(-1px)}
.btn-social:active{transform:translateY(0)}
.btn-social svg{flex-shrink:0}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.10)}
.divider-text{font-size:.76rem;color:rgba(255,255,255,.30);white-space:nowrap;font-weight:500}

/* ── FLOATING LABEL FIELDS ── */
.field{position:relative;margin-bottom:18px}
.field input{
  width:100%;height:50px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:16px 44px 6px 16px;
  font:500 .94rem 'Inter',sans-serif;color:#fff;
  outline:none;transition:border-color .2s,background .2s;
  appearance:none;-webkit-appearance:none;
}
.field input::placeholder{color:transparent}
.field input:focus{border-color:rgba(99,102,241,.7);background:rgba(99,102,241,.07)}
.field input:-webkit-autofill,.field input:-webkit-autofill:focus{
  -webkit-box-shadow:0 0 0 1000px rgba(20,20,40,.9) inset;
  -webkit-text-fill-color:#fff;
  border-color:rgba(99,102,241,.7);
}
.field label{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  font:500 .88rem 'Inter',sans-serif;color:rgba(255,255,255,.38);
  pointer-events:none;transition:all .18s cubic-bezier(.4,0,.2,1);
}
.field input:focus ~ label,
.field input:not(:placeholder-shown) ~ label{
  top:10px;transform:translateY(0);font-size:.68rem;color:rgba(99,102,241,.9)
}
.field .field-icon{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.25);font-size:.95rem;cursor:pointer;transition:color .15s;
}
.field .field-icon:hover{color:rgba(255,255,255,.6)}

/* ── SUBMIT BTN ── */
.btn-submit{
  width:100%;height:48px;margin-top:6px;
  border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);
  color:#fff;font:700 .96rem 'Inter',sans-serif;letter-spacing:.02em;
  box-shadow:0 8px 24px rgba(99,102,241,.38);
  transition:transform .15s,box-shadow .15s,filter .15s;
  position:relative;overflow:hidden;
}
.btn-submit::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);
  opacity:0;transition:opacity .15s;
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(99,102,241,.50);filter:brightness(1.08)}
.btn-submit:hover::after{opacity:1}
.btn-submit:active{transform:translateY(0);box-shadow:0 6px 18px rgba(99,102,241,.30)}
.btn-submit.loading{pointer-events:none;opacity:.7}

/* ── FOOTER LINK ── */
.card-footer{margin-top:20px;text-align:center;font-size:.78rem;color:rgba(255,255,255,.28)}
.card-footer a{color:rgba(99,102,241,.9);text-decoration:none;font-weight:600;transition:color .15s}
.card-footer a:hover{color:#818cf8}

/* ── RIPPLE ── */
@keyframes ripple{to{transform:scale(4);opacity:0}}
.ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,.25);width:60px;height:60px;transform:scale(0);animation:ripple .5s linear;pointer-events:none}

@media(prefers-reduced-motion:reduce){
  .blob{animation:none}
  .card{animation:none}
}
</style>
</head>
<body>
<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<main class="page">
  <div class="card">

    <!-- Logo -->
    <div class="card-logo">
      <img src="icosis-c.png" alt="SIS-C">
      <h1>SIS-C Contábil</h1>
      <p>Bem-vindo de volta. Faça login para continuar.</p>
    </div>

    <!-- Social login -->
    <div class="social-row">
      <button class="btn-social" id="btnGoogle" type="button">
        <!-- Google "G" logo -->
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85L37.5 7C33.78 3.94 29.15 2 24 2 14.82 2 6.98 7.6 3.43 15.56l5.84 4.53C11.04 14.02 17.06 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.55c0-1.64-.15-3.22-.42-4.75H24v8.98h12.44c-.54 2.88-2.18 5.33-4.65 6.97l7.18 5.58C43.32 37.27 46.1 31.37 46.1 24.55z"/><path fill="#FBBC05" d="M9.27 28.47A14.5 14.5 0 0 1 9.5 24c0-1.56.27-3.08.73-4.5L4.39 14.97A22.48 22.48 0 0 0 1.5 24c0 3.36.73 6.55 2.03 9.44l5.74-4.97z"/><path fill="#34A853" d="M24 46c5.15 0 9.47-1.7 12.63-4.62l-7.18-5.58c-1.78 1.19-4.06 1.9-6.45 1.9-6.9 0-12.74-4.58-14.84-10.8l-5.84 4.53C6.94 40.35 14.82 46 24 46z"/></svg>
        Google
      </button>
      <button class="btn-social" id="btnApple" type="button">
        <!-- Apple logo -->
        <svg width="17" height="17" viewBox="0 0 814 1000" fill="#fff"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 376.8 0 290.3 0 207.8C0 93.8 88.9 33.1 186.1 33.1c50.3 0 90.7 32.6 120.1 32.6 28.4 0 73.4-34.6 131.6-34.6 24.3 0 108.3 2.6 168.8 102.6zm-90.7-224.6c28.4-35.9 48.3-86.2 48.3-136.5 0-7.1-.6-14.3-1.9-20.1-45.7 1.9-99.2 30.6-131.6 71.3-26.5 31.9-50.9 82.5-50.9 133.4 0 7.7 1.3 15.5 1.9 17.8 3.2.6 8.4 1.3 13.6 1.3 40.8 0 91.8-27.8 120.6-67.2z"/></svg>
        Apple
      </button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">ou continue com e-mail</span>
      <div class="divider-line"></div>
    </div>

    <!-- Form -->
    <form id="loginForm" autocomplete="on" novalidate>

      <div class="field">
        <input id="usuario" type="text" name="usuario" placeholder=" " autocomplete="username">
        <label for="usuario">Usuário ou e-mail</label>
        <i class="fa-regular fa-user field-icon"></i>
      </div>

      <div class="field">
        <input id="senha" type="password" name="senha" placeholder=" " autocomplete="current-password">
        <label for="senha">Senha</label>
        <button class="field-icon" type="button" id="togglePwd" aria-label="Mostrar senha" style="background:none;border:none;padding:0;cursor:pointer;">
          <i class="fa-regular fa-eye-slash"></i>
        </button>
      </div>

      <button class="btn-submit" type="submit" id="btnSubmit">
        Entrar
      </button>
    </form>

    <div class="card-footer">
      Acesso restrito &mdash; <a href="#">Esqueci minha senha</a>
    </div>

  </div>
</main>

<script>
(function () {
  // Password toggle
  var pwd = document.getElementById('senha');
  var togglePwd = document.getElementById('togglePwd');
  togglePwd.addEventListener('click', function () {
    var show = pwd.type === 'password';
    pwd.type = show ? 'text' : 'password';
    togglePwd.innerHTML = show
      ? '<i class="fa-regular fa-eye"></i>'
      : '<i class="fa-regular fa-eye-slash"></i>';
    togglePwd.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
  });

  // Ripple effect for submit button
  var btnSubmit = document.getElementById('btnSubmit');
  btnSubmit.addEventListener('click', function (e) {
    var r = document.createElement('span');
    r.classList.add('ripple-effect');
    var rect = btnSubmit.getBoundingClientRect();
    r.style.left = (e.clientX - rect.left - 30) + 'px';
    r.style.top = (e.clientY - rect.top - 30) + 'px';
    btnSubmit.appendChild(r);
    setTimeout(function () { r.remove(); }, 600);
  });

  // Form submit
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    btnSubmit.classList.add('loading');
    btnSubmit.textContent = 'Entrando…';
    setTimeout(function () {
      window.location.assign(new URL('./modulos.html', window.location.href).href);
    }, 600);
  });

  // Google / Apple — development notice
  function devNotice(provider) {
    alert('Login com ' + provider + ' estará disponível em breve.');
  }
  document.getElementById('btnGoogle').addEventListener('click', function () { devNotice('Google'); });
  document.getElementById('btnApple').addEventListener('click', function () { devNotice('Apple'); });
})();
</script>
</body>
</html>
